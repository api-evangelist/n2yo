naftiko: 1.0.0-alpha2
info:
  label: N2YO Satellite Tracking API — Visual Passes
  description: 'N2YO Satellite Tracking API — Visual Passes. 1 operations. Lead operation: Get visual passes. Self-contained
    Naftiko capability covering one N2yo business surface.'
  tags:
  - N2yo
  - Visual Passes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    N2YO_API_KEY: N2YO_API_KEY
capability:
  consumes:
  - type: http
    namespace: n2yo-visual-passes
    baseUri: https://api.n2yo.com/rest/v1/satellite
    description: N2YO Satellite Tracking API — Visual Passes business capability. Self-contained, no shared references.
    resources:
    - name: visualpasses-id-observer_lat-observer_lng-observer_alt-days-min_visibility
      path: /visualpasses/{id}/{observer_lat}/{observer_lng}/{observer_alt}/{days}/{min_visibility}
      operations:
      - name: getvisualpasses
        method: GET
        description: Get visual passes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: days
          in: path
          type: integer
          description: Days of prediction (max 10).
          required: true
        - name: min_visibility
          in: path
          type: integer
          description: Minimum visible seconds for a returned pass.
          required: true
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.N2YO_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: n2yo-visual-passes-rest
    port: 8080
    description: REST adapter for N2YO Satellite Tracking API — Visual Passes. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/visualpasses/{id}/{observer-lat}/{observer-lng}/{observer-alt}/{days}/{min-visibility}
      name: visualpasses-id-observer-lat-observer-lng-observer-alt-days-min-visibility
      description: REST surface for visualpasses-id-observer_lat-observer_lng-observer_alt-days-min_visibility.
      operations:
      - method: GET
        name: getvisualpasses
        description: Get visual passes
        call: n2yo-visual-passes.getvisualpasses
        with:
          days: rest.days
          min_visibility: rest.min_visibility
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: n2yo-visual-passes-mcp
    port: 9090
    transport: http
    description: MCP adapter for N2YO Satellite Tracking API — Visual Passes. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-visual-passes
      description: Get visual passes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: n2yo-visual-passes.getvisualpasses
      with:
        days: tools.days
        min_visibility: tools.min_visibility
      outputParameters:
      - type: object
        mapping: $.
