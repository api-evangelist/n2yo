naftiko: 1.0.0-alpha2
info:
  label: N2YO Satellite Tracking API — Radio Passes
  description: 'N2YO Satellite Tracking API — Radio Passes. 1 operations. Lead operation: Get radio passes. Self-contained
    Naftiko capability covering one N2yo business surface.'
  tags:
  - N2yo
  - Radio Passes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    N2YO_API_KEY: N2YO_API_KEY
capability:
  consumes:
  - type: http
    namespace: n2yo-radio-passes
    baseUri: https://api.n2yo.com/rest/v1/satellite
    description: N2YO Satellite Tracking API — Radio Passes business capability. Self-contained, no shared references.
    resources:
    - name: radiopasses-id-observer_lat-observer_lng-observer_alt-days-min_elevation
      path: /radiopasses/{id}/{observer_lat}/{observer_lng}/{observer_alt}/{days}/{min_elevation}
      operations:
      - name: getradiopasses
        method: GET
        description: Get radio passes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: days
          in: path
          type: integer
          description: Days of prediction (max 10).
          required: true
        - name: min_elevation
          in: path
          type: integer
          description: Minimum elevation in degrees.
          required: true
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.N2YO_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: n2yo-radio-passes-rest
    port: 8080
    description: REST adapter for N2YO Satellite Tracking API — Radio Passes. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/radiopasses/{id}/{observer-lat}/{observer-lng}/{observer-alt}/{days}/{min-elevation}
      name: radiopasses-id-observer-lat-observer-lng-observer-alt-days-min-elevation
      description: REST surface for radiopasses-id-observer_lat-observer_lng-observer_alt-days-min_elevation.
      operations:
      - method: GET
        name: getradiopasses
        description: Get radio passes
        call: n2yo-radio-passes.getradiopasses
        with:
          days: rest.days
          min_elevation: rest.min_elevation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: n2yo-radio-passes-mcp
    port: 9090
    transport: http
    description: MCP adapter for N2YO Satellite Tracking API — Radio Passes. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-radio-passes
      description: Get radio passes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: n2yo-radio-passes.getradiopasses
      with:
        days: tools.days
        min_elevation: tools.min_elevation
      outputParameters:
      - type: object
        mapping: $.
